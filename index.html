<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMI IMUT - Aplikasi Belajar Isyarat Tunarungu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-purple: #A855F7;
            --accent-cyan: #06B6D4;
            --accent-green: #10B981;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1.title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #FFF 20%, #A855F7 50%, #06B6D4 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle { color: var(--text-muted); font-size: 16px; margin-bottom: 32px; }
        
        #webcam-container {
            margin: 0 auto 32px auto;
            width: 480px;
            height: 480px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            background-color: #0B0F19;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #webcam-container canvas { width: 100% !important; height: 100% !important; }
        
        .placeholder-text { color: var(--accent-cyan); font-size: 18px; font-weight: 700; }
        
        .btn-mulai {
            font-weight: 800;
            background: linear-gradient(135deg, #A855F7 0%, #06B6D4 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 20px;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        #label-container {
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bar-prediksi {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.9);
            padding: 14px 24px;
            border-radius: 14px;
            border-left: 5px solid var(--accent-purple);
            font-size: 16px;
            font-weight: 700;
        }

        .nama-kelas { color: var(--text-main); text-transform: uppercase;}
        .persen-kelas { color: var(--accent-cyan); font-family: 'Space Grotesk', sans-serif;}
        
        #celebration-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            display: none;
            border: 2px solid var(--accent-green);
        }

        #celebration-overlay h2 { color: var(--accent-green); font-size: 52px; }
        #nama-kata-sukses { color: var(--accent-cyan); font-weight: 700; }
    </style>
</head>
<body>

    <div class="main-card">
        <div id="celebration-overlay">
            <h2>🎉 HEBAT !!! 🎉</h2>
            <p>Isyarat <span id="nama-kata-sukses">KATA</span> Kamu Benar! 🥳</p>
        </div>

        <h1 class="title">AMI IMUT</h1>
        <p class="subtitle">Aplikasi Multimedia Inklusif Interaktif Murid Tunarungu</p>
        
        <button type="button" class="btn-mulai" onclick="startAmiImut()">Mulai Belajar ⚡</button>
        
        <div id="webcam-container">
            <div class="placeholder-text" id="placeholder-info">Kamera siap diaktifkan.<br>Yuk, klik tombol di atas untuk belajar!</div>
        </div>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8.6/dist/teachablemachine-pose.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="text/javascript">
        const URL_MODEL = "./"; 

        let model, webcam, ctx, labelContainer, maxPredictions;
        let isCelebrating = false; 
        let animationFrameId = null;

        async function startAmiImut() {
            const placeholder = document.getElementById("placeholder-info");
            placeholder.innerHTML = "Menghubungkan ke Otak AI Pose... Tunggu bentar ya...";

            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }

            try {
                // 1. Memuat Model AI
                model = await tmPose.load(URL_MODEL + "model.json", URL_MODEL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                // 2. Setup Webcam Kotak
                const size = 480;
                const flip = true; 
                webcam = new tmPose.Webcam(size, size, flip); 
                await webcam.setup(); 
                await webcam.play();
                
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                ctx = webcam.canvas.getContext("2d");

                // 3. Setup Label Tampilan
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    let divBar = document.createElement("div");
                    divBar.className = "bar-prediksi";
                    divBar.innerHTML = `<span class="nama-kelas">Memuat kata...</span><span class="persen-kelas">0%</span>`;
                    labelContainer.appendChild(divBar);
                }

                // 4. Jalankan perulangan gambar
                animationFrameId = window.requestAnimationFrame(loopAmi);

            } catch (error) {
                placeholder.innerHTML = "❌ Gagal memuat kamera atau model AI.";
                console.error(error);
            }
        }

        async function loopAmi() {
            if (webcam) {
                webcam.update(); 
                await prediksiIsyaratAnak();
            }
            animationFrameId = window.requestAnimationFrame(loopAmi);
        }

        async function prediksiIsyaratAnak() {
            if (!model || !webcam || !webcam.canvas) return;

            try {
                // GAMBAR VISUAL KAMERA TERLEBIH DAHULU AGAR VIDEONYA SAMA SEKALI TIDAK DIAM/MEMBLE
                if (ctx) {
                    ctx.drawImage(webcam.canvas, 0, 0);
                }

                // BYPASS BUGS GOOGLE: Gunakan estimatePredictions, jangan pakai estimatePose untuk ambil kata
                const prediction = await model.estimatePredictions(webcam.canvas);
                
                if (!prediction || prediction.length === 0) return;

                // COBA AMBIL ESTIMASI POSE TERPISAH HANYA UNTUK GAMBAR KERANGKA
                try {
                    const { pose } = await model.estimatePose(webcam.canvas);
                    if (ctx && pose && pose.keypoints) {
                        model.drawKeypoints(pose.keypoints, 0.6, ctx);
                        model.drawSkeleton(pose.keypoints, 0.6, ctx);
                    }
                } catch(e) {
                    // Abaikan error gambar kerangka agar perulangan video utama tidak macet
                }
                
                let pemicuSelebrasi = null;

                // BACA RESPON DAN PERSENTASE DARI KATA MODEL AI KAMERA
                for (let i = 0; i < maxPredictions; i++) {
                    const namaGerakan = prediction[i].className; 
                    const akurasi = prediction[i].probability; 
                    const persen = (akurasi * 100).toFixed(0);

                    if (labelContainer && labelContainer.childNodes[i]) {
                        labelContainer.childNodes[i].innerHTML = `
                            <span class="nama-kelas">${namaGerakan}</span>
                            <span class="persen-kelas">${persen}% MATCH</span>
                        `;
                    }

                    const namaGerakanUpper = namaGerakan.toUpperCase();
                    const isKataAbaikan = namaGerakanUpper === "NORMAL" || namaGerakanUpper === "BACKGROUND" || namaGerakanUpper === "NETRAL";

                    if (akurasi > 0.85 && !isCelebrating && !isKataAbaikan) {
                        pemicuSelebrasi = namaGerakan;
                    }
                }

                if (pemicuSelebrasi) {
                    jalankanSelebrasi(pemicuSelebrasi);
                }
            } catch (err) {
                console.error("Proses prediksi terjeda:", err);
            }
        }

        function jalankanSelebrasi(namaGerakan) {
            isCelebrating = true; 
            document.getElementById("nama-kata-sukses").innerText = `"${namaGerakan.toUpperCase()}"`;
            const overlay = document.getElementById("celebration-overlay");
            overlay.style.display = "flex";

            let duration = 3.5 * 1000; 
            let end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end && isCelebrating) { requestAnimationFrame(frame); }
            }());

            setTimeout(() => {
                overlay.style.display = "none";
                isCelebrating = false;
            }, 3500);
        }
    </script>
</body>
</html>
