<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMI IMUT - Aplikasi Belajar Isyarat Tunarungu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        :root {
            --bg-gradient: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-purple: #A855F7;
            --accent-cyan: #06B6D4;
            --accent-green: #10B981;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-x: hidden;
        }

        .glow-orb-1 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(168,85,247,0.15) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }
        .glow-orb-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -150px;
            z-index: 0;
            pointer-events: none;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1.title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 8px;
            background: linear-gradient(to right, #FFF 20%, #A855F7 50%, #06B6D4 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 32px;
            letter-spacing: 0.5px;
        }
        
        #webcam-container {
            margin: 0 auto 32px auto;
            width: 100%;
            max-width: 640px;
            height: 480px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            overflow: hidden;
            background-color: #0B0F19;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), inset 0 0 30px rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }
        
        .placeholder-text {
            color: var(--accent-cyan);
            font-size: 18px;
            padding: 24px;
            font-weight: 700;
            line-height: 1.6;
            letter-spacing: 0.5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        .btn-mulai {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            background: linear-gradient(135deg, #A855F7 0%, #06B6D4 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 20px;
            letter-spacing: 1px;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .btn-mulai:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.6);
        }

        .btn-mulai:active {
            transform: translateY(1px);
        }
        
        #label-container {
            margin-top: 16px;
            padding: 12px;
            background-color: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }

        .bar-prediksi {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(30, 41, 59, 0.9);
            padding: 14px 24px;
            border-radius: 14px;
            border-left: 5px solid var(--accent-purple);
            font-size: 16px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .nama-kelas { 
            color: var(--text-main); 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .persen-kelas { 
            color: var(--accent-cyan); 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
        }
        
        #celebration-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            display: none;
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border: 2px solid var(--accent-green);
        }

        #celebration-overlay h2 {
            font-family: 'Space Grotesk', sans-serif;
            color: var(--accent-green);
            font-size: 52px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        #celebration-overlay p {
            font-size: 22px;
            color: var(--text-main);
            margin-top: 16px;
            font-weight: 500;
        }

        #nama-kata-sukses {
            color: var(--accent-cyan);
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            padding: 4px 16px;
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.2);
            border-radius: 12px;
            display: inline-block;
            margin: 0 4px;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="glow-orb-1"></div>
    <div class="glow-orb-2"></div>

    <div class="main-card">
        <div id="celebration-overlay">
            <h2>🎉 HEBAT !!! 🎉</h2>
            <p>Isyarat <span id="nama-kata-sukses">KATA</span> Kamu Benar! 🥳</p>
        </div>

        <h1 class="title">AMI IMUT</h1>
        <p class="subtitle">Aplikasi Multimedia Inklusif Interaktif Murid Tunarungu</p>
        
        <button type="button" class="btn-mulai" onclick="startAmiImut()">Mulai Belajar ⚡</button>
        
        <div id="webcam-container">
            <div class="placeholder-text" id="placeholder-info">Kamera siap diaktifkan.<br>Yuk, klik tombol di atas untuk belajar!</div>
        </div>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@latest/dist/teachablemachine-pose.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script type="text/javascript">
        // Deteksi lokasi path folder dinamis otomatis
        const currentLocation = window.location.href;
        const URL_MODEL = currentLocation.substring(0, currentLocation.lastIndexOf('/')) + "/"; 

        let model, webcam, ctx, labelContainer, maxPredictions;
        let isCelebrating = false; 

        async function startAmiImut() {
            const placeholder = document.getElementById("placeholder-info");
            placeholder.innerHTML = "Menghubungkan ke Otak AI Pose... Tunggu bentar ya...";

            try {
                // MENGGUNAKAN tmPose BUKAN tmImage
                model = await tmPose.load(URL_MODEL + "model.json", URL_MODEL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                const flip = true; 
                webcam = new tmPose.Webcam(640, 480, flip); 
                await webcam.setup(); 
                await webcam.play();
                
                window.requestAnimationFrame(loopAmi);

                // Buat Canvas khusus untuk merender kamera pose
                const canvas = document.createElement("canvas");
                canvas.width = 640;
                canvas.height = 480;
                ctx = canvas.getContext("2d");

                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(canvas);
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    let divBar = document.createElement("div");
                    divBar.className = "bar-prediksi";
                    divBar.innerHTML = `<span class="nama-kelas">Memuat kata...</span><span class="persen-kelas">0%</span>`;
                    labelContainer.appendChild(divBar);
                }
            } catch (error) {
                placeholder.innerHTML = "❌ Gagal memuat AI lokal.<br><br>Solusi: Pastikan nama file wajib huruf kecil semua (model.json, metadata.json, weights.bin) dan berada di satu folder di GitHub!";
                console.error(error);
            }
        }

        async function loopAmi() {
            webcam.update(); 
            await prediksiIsyaratAnak();
            window.requestAnimationFrame(loopAmi);
        }

        async function prediksiIsyaratAnak() {
            // Prediksi pose tubuh anak beserta kerangka skeletalnya
            const { pose, prediction } = await model.estimatePose(webcam.canvas);
            
            // Gambar kamera dan kerangka tubuh di canvas layar
            if (ctx) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    // Menampilkan garis kerangka tulang berwarna cyan/purple cerah di tubuh anak
                    model.drawKeypoints(pose.keypoints, 0.6, ctx);
                    model.drawSkeleton(pose.keypoints, 0.6, ctx);
                }
            }
            
            for (let i = 0; i < maxPredictions; i++) {
                const namaGerakan = prediction[i].className; 
                const akurasi = prediction[i].probability; 
                const persen = (akurasi * 100).toFixed(0);

                if (labelContainer.childNodes[i]) {
                    labelContainer.childNodes[i].innerHTML = `
                        <span class="nama-kelas">${namaGerakan}</span>
                        <span class="persen-kelas">${persen}% MATCH</span>
                    `;
                    if(akurasi > 0.5) {
                        labelContainer.childNodes[i].style.borderColor = "var(--accent-cyan)";
                    } else {
                        labelContainer.childNodes[i].style.borderColor = "var(--accent-purple)";
                    }
                }

                // Logika selebrasi dinamis ketika akurasi gerakan > 85%
                if (akurasi > 0.85 && !isCelebrating) {
                    // Deteksi kata dari modelmu: 'Normal', 'Sakit', 'Terimakasih', 'Makan'
                    if (namaGerakan.toUpperCase() === "NORMAL" || namaGerakan.toUpperCase() === "BACKGROUND" || namaGerakan.toUpperCase() === "NETRAL") {
                        continue; 
                    }

                    isCelebrating = true; 
                    
                    document.getElementById("nama-kata-sukses").innerText = `"${namaGerakan.toUpperCase()}"`;
                    
                    const overlay = document.getElementById("celebration-overlay");
                    overlay.style.display = "flex";

                    let duration = 2.5 * 1000;
                    let end = Date.now() + duration;

                    (function frame() {
                        confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 } });
                        confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 } });
                        if (Date.now() < end) { requestAnimationFrame(frame); }
                    }());

                    setTimeout(() => {
                        overlay.style.display = "none";
                        isCelebrating = false;
                    }, 3500);
                }
            }
        }
    </script>
</body>
</html>
